
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaBot Gallery</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

h1 {
    text-align: center;
    padding-top: 20px;
    margin-bottom: 5px;
}

.credit {
    text-align: center;
    color: #bdbdbd;
    font-size: 15px;
    margin-bottom: 25px;
}

.credit b {
    color: #ffffff;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 10px;
    padding: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: .2s;
}

.gallery img:hover {
    transform: scale(1.03);
}
</style>

</head>

<body>

<h1>MediaBot Gallery</h1>

<p class="credit">
Owner ✨ <b>KEN</b>
</p>

<div class="gallery">
<a href="https://raw.githubusercontent.com/Rebel727/mediabot-gallery/main/images/9ce9cd04d59143d6a226f923c05a67a9.jpg" target="_blank"><img src="https://raw.githubusercontent.com/Rebel727/mediabot-gallery/main/images/9ce9cd04d59143d6a226f923c05a67a9.jpg"></a>

</div>

</body>
</html>
