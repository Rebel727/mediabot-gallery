
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaBot Gallery</title>

<style>
body {
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

h1 {
    text-align:center;
    padding:20px;
}

.gallery {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
    padding:15px;
}

.gallery img {
    width:100%;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

.gallery img:hover {
    transform:scale(1.03);
}
</style>

</head>

<body>

<h1>MediaBot Gallery</h1>

<div class="gallery">

</body>
</html>
