<title>MediaBot Gallery</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

h1 {
    text-align: center;
    padding-top: 20px;
    margin-bottom: 5px;
}

.credit {
    text-align: center;
    color: #bdbdbd;
    font-size: 15px;
    margin-bottom: 25px;
}

.credit b {
    color: #ffffff;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 10px;
    padding: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: .2s;
}

.gallery img:hover {
    transform: scale(1.03);
}
</style>

</head>
